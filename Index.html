<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>건축법규 AI — 법령·해석례·건설기준 통합 검색 & 무료 상담</title>
<meta name="description" content="한국 건축 법규를 쉽고 빠르게. 법령, 해석례, KDS/KCS 건설기준코드 통합 검색 & 무료 상담. 로그인·설정 불필요.">
<meta name="theme-color" content="#0C1222">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏛️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Noto Sans KR','DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;background:#F7F8FA;color:#1E293B;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
input:focus,textarea:focus,select:focus{outline:none}
button{font-family:inherit}
@keyframes su{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes pu{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

.header{background:linear-gradient(135deg,#0C1222,#1A2744,#263B5E);padding:26px 16px 18px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 35px,rgba(255,255,255,.02) 35px,rgba(255,255,255,.02) 36px),repeating-linear-gradient(90deg,transparent,transparent 35px,rgba(255,255,255,.02) 35px,rgba(255,255,255,.02) 36px)}
.header-inner{position:relative;z-index:1;max-width:700px;margin:0 auto;display:flex;align-items:center;gap:12px}
.logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#EF4444,#F97316);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 18px rgba(239,68,68,.3);flex-shrink:0}
.header h1{font-family:'DM Sans',sans-serif;font-size:22px;font-weight:800;color:#fff;letter-spacing:-.5px}
.header h1 span{background:linear-gradient(135deg,#EF4444,#F97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{font-size:10px;color:rgba(255,255,255,.4);font-weight:500;margin-top:2px}
.container{max-width:700px;margin:0 auto;padding:10px 14px 120px}
.tabs{display:flex;background:#EFF1F5;border-radius:12px;padding:3px;gap:3px;margin-bottom:10px}
.tab{flex:1;padding:11px 0;border-radius:9px;border:none;cursor:pointer;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;background:transparent;color:#94A3B8}
.tab.active{background:#fff;color:#0F172A;box-shadow:0 2px 8px rgba(0,0,0,.05)}

.search-bar{display:flex;align-items:center;background:#fff;border-radius:12px;padding:3px 13px;border:2px solid #EAECF0;margin-bottom:8px;transition:border .2s}
.search-bar:focus-within{border-color:#EF4444}
.search-bar input{flex:1;border:none;padding:11px 10px;font-size:13px;font-weight:500;background:transparent;color:#101828}
.search-bar button{background:none;border:none;cursor:pointer;color:#98A2B3;padding:3px}

.filters{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.filter-btn{font-size:11px;font-weight:600;padding:5px 12px;border-radius:16px;border:none;cursor:pointer;transition:all .2s;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.filter-btn.active{color:#fff}

.cats{display:flex;gap:5px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch}
.cat-btn{padding:6px 11px;border-radius:14px;border:none;cursor:pointer;font-size:11px;font-weight:700;white-space:nowrap;transition:all .2s;box-shadow:0 1px 2px rgba(0,0,0,.04)}

.results-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.results-count{font-size:11px;color:#98A2B3;font-weight:600}
.fav-btn{display:flex;align-items:center;gap:4px;background:transparent;border:1px solid transparent;border-radius:14px;padding:3px 9px;cursor:pointer;font-size:11px;font-weight:600;color:#98A2B3;transition:all .2s}
.fav-btn.active{background:#FEF3C7;border-color:#FDE68A;color:#92400E}

/* Card */
.card{background:#fff;border:1px solid #EAECF0;border-radius:16px;padding:15px 17px;cursor:pointer;transition:all .22s;position:relative;animation:su .4s ease both}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.04)}
.card.link-card{background:#F8FFF8}
.card.link-card:hover{background:#F0FDF4}
.card-badges{display:flex;align-items:center;gap:5px;margin-bottom:7px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px}
.card-title{font-weight:700;font-size:14px;color:#101828;margin-bottom:4px;line-height:1.45;padding-right:22px}
.card-law{font-size:11px;color:#667085;font-weight:500}
.card-fav{position:absolute;top:11px;right:11px;background:none;border:none;cursor:pointer;padding:2px;color:#D0D5DD;transition:color .2s}
.card-fav.active{color:#F59E0B}

/* Detail */
.detail{animation:su .3s ease}
.back-btn{display:flex;align-items:center;gap:5px;background:none;border:none;color:#667085;cursor:pointer;font-size:13px;font-weight:600;padding:7px 0;margin-bottom:12px}
.detail-box{background:#fff;border-radius:18px;overflow:hidden;border:1px solid #EAECF0;box-shadow:0 4px 16px rgba(0,0,0,.04)}
.detail-bar{height:5px}
.detail-inner{padding:20px 20px 24px}
.detail-title{font-size:19px;font-weight:800;color:#101828;margin:0 0 10px;line-height:1.4}
.detail-law{font-size:12px;font-weight:600;margin-bottom:18px;padding:8px 13px;border-radius:8px;display:inline-block}
.original-link{display:flex;align-items:center;gap:8px;padding:12px 16px;background:linear-gradient(135deg,#EFF6FF,#F0FDF4);border-radius:12px;text-decoration:none;border:1px solid #BFDBFE;margin-bottom:18px;transition:all .2s}
.original-link:hover{border-color:#3B82F6}
.original-link .label{font-size:13px;font-weight:700;color:#1D4ED8}
.original-link .url{font-size:10px;color:#64748B;margin-top:2px;word-break:break-all}

/* Table */
.data-table{margin-bottom:16px}
.data-table .table-title{font-size:12px;font-weight:700;color:#1E293B;margin-bottom:8px}
.data-table .table-wrap{overflow-x:auto;border-radius:10px;border:1px solid #E2E8F0}
.data-table table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{background:#F1F5F9;padding:8px 10px;text-align:left;font-weight:700;color:#334155;border-bottom:2px solid #CBD5E1;white-space:nowrap}
.data-table td{padding:7px 10px;border-bottom:1px solid #F1F5F9;color:#475569}
.data-table tr:nth-child(even){background:#F8FAFC}
.data-table td:first-child{color:#1E293B;font-weight:600}

.content-block{font-size:13px;color:#334155;line-height:1.85;white-space:pre-wrap;background:#F8FAFC;padding:18px 18px;border-radius:14px;border:1px solid #F1F5F9;font-family:'Noto Sans KR',monospace}
.tags{margin-top:16px;display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:10px;color:#475467;background:#F1F5F9;padding:3px 10px;border-radius:12px;font-weight:500}
.warning{margin-top:18px;padding:11px 14px;background:#FFFBEB;border-radius:10px;font-size:11px;color:#92400E;line-height:1.6;border:1px solid #FEF3C7}

/* Related */
.related{margin-top:18px}
.related-title{font-size:12px;font-weight:700;color:#344054;margin-bottom:8px}
.related-item{background:#fff;border:1px solid #EAECF0;border-radius:10px;padding:10px 13px;margin-bottom:5px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .2s}
.related-item:hover{border-color:#3B82F688}
.related-item.link{background:#F8FFF8}

/* Chat */
.chat-welcome{flex:1;display:flex;flex-direction:column;align-items:center;padding:24px 0}
.chat-icon{width:60px;height:60px;border-radius:18px;background:linear-gradient(135deg,#0C1222,#1A2744);display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:14px;box-shadow:0 8px 24px rgba(12,18,34,.25);animation:fl 3s ease-in-out infinite}
.chat-q{text-align:left;padding:10px 13px;background:#fff;border:1px solid #EAECF0;border-radius:10px;cursor:pointer;font-size:12px;color:#344054;font-weight:500;transition:all .2s;width:100%;margin-bottom:5px}
.chat-q:hover{border-color:#EF4444;background:#FEF2F2}
.msg{display:flex;animation:su .3s ease}
.msg-user{justify-content:flex-end}
.msg-bubble{max-width:90%;padding:11px 15px;font-size:13px;line-height:1.8;white-space:pre-wrap}
.msg-user .msg-bubble{background:linear-gradient(135deg,#0C1222,#1A2744);color:#fff;border-radius:15px 15px 4px 15px;box-shadow:0 3px 10px rgba(12,18,34,.12)}
.msg-ai .msg-bubble{background:#fff;color:#344054;border-radius:15px 15px 15px 4px;box-shadow:0 2px 8px rgba(0,0,0,.03);border:1px solid #EAECF0}
.msg-ai .msg-label{font-size:10px;font-weight:700;color:#EF4444;margin-bottom:5px}
.loading-dots{display:flex;align-items:center;gap:8px;padding:8px 0}
.loading-dots .dot{width:7px;height:7px;border-radius:50%;background:#EF4444}
.loading-dots .dot:nth-child(1){animation:pu 1.2s ease infinite}
.loading-dots .dot:nth-child(2){animation:pu 1.2s ease .2s infinite}
.loading-dots .dot:nth-child(3){animation:pu 1.2s ease .4s infinite}

.chat-input-wrap{position:sticky;bottom:0;background:linear-gradient(transparent,#F7F8FA 20%);padding-top:14px}
.chat-new{display:block;margin:0 auto 7px;background:none;border:1px solid #E2E8F0;border-radius:14px;padding:4px 12px;cursor:pointer;font-size:10px;color:#94A3B8;font-weight:600}
.chat-input{display:flex;align-items:center;gap:6px;background:#fff;border-radius:13px;padding:3px 5px 3px 15px;border:2px solid #EAECF0;transition:border .2s}
.chat-input:focus-within{border-color:#EF4444}
.chat-input input{flex:1;border:none;padding:11px 0;font-size:13px;font-weight:500;background:transparent;color:#101828}
.send-btn{width:38px;height:38px;border-radius:10px;border:none;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;cursor:pointer}
.send-btn.active{background:linear-gradient(135deg,#EF4444,#F97316);color:#fff;box-shadow:0 4px 12px rgba(239,68,68,.25)}
.send-btn.inactive{background:#F2F4F7;color:#CBD5E1;cursor:default}

.no-results{text-align:center;padding:44px 20px;color:#98A2B3}
.no-results .icon{font-size:40px;margin-bottom:10px}
.no-results .title{font-size:15px;font-weight:700;color:#667085}
</style>
</head>

<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════
// 건축법규 AI — 단일 HTML 배포 파일

const DB=[
{id:1,cat:"계획",sub:"용도지역",title:"건폐율 기준 (전체 용도지역)",type:"detail",source:"LAW",code:"",law:"국토의 계획 및 이용에 관한 법률 제77조, 시행령 제84조",url:"https://www.law.go.kr/법령/국토의계획및이용에관한법률시행령/(20250227,35148,20250227)/제84조",tables:[{title:"용도지역별 건폐율 상한",headers:["용도지역","건폐율 상한","비고"],rows:[["제1종 전용주거","50%","단독주택"],["제2종 전용주거","50%","공동주택"],["제1종 일반주거","60%","저층"],["제2종 일반주거","60%","중층"],["제3종 일반주거","50%","중·고층"],["준주거","70%","주거+상업"],["중심상업","90%","도심"],["일반상업","80%",""],["근린상업","70%",""],["유통상업","80%",""],["전용공업","70%",""],["일반공업","70%",""],["준공업","70%",""],["보전녹지","20%",""],["생산녹지","20%",""],["자연녹지","20%",""]]}],content:"▣ 건폐율 = (건축면적 ÷ 대지면적) × 100%\n\n▣ 적용 원칙\n① 2이상 용도지역 걸치면 → 면적비율 가중평균\n② 지자체 조례로 상한 이내 별도 규정 가능\n③ 방화지구: 최대 10%p 가산 완화\n④ 도시형생활주택·역세권 추가 완화 가능\n\n▣ 실무 TIP\n• 건축면적 = 외벽/기둥 중심선 수평투영면적\n• 처마·차양 1m+ 돌출시 1m 후퇴선에서 산정\n• 대지면적에서 도로편입 부분 제외",tags:["건폐율","용도지역","주거지역","상업지역"]},

{id:2,cat:"계획",sub:"용도지역",title:"용적률 기준 (전체 용도지역)",type:"detail",source:"LAW",code:"",law:"국토의 계획 및 이용에 관한 법률 제78조, 시행령 제85조",url:"https://www.law.go.kr/법령/국토의계획및이용에관한법률시행령/(20250227,35148,20250227)/제85조",tables:[{title:"용도지역별 용적률",headers:["용도지역","하한","상한","서울 조례(참고)"],rows:[["제1종전용주거","50%","100%","100%"],["제2종전용주거","100%","150%","120%"],["제1종일반주거","100%","200%","150%"],["제2종일반주거","150%","250%","200%"],["제3종일반주거","200%","300%","250%"],["준주거","200%","500%","400%"],["중심상업","200%","1500%","1000%"],["일반상업","200%","1300%","800%"],["근린상업","200%","900%","600%"],["전용공업","150%","300%","200%"],["준공업","200%","400%","400%"],["자연녹지","50%","100%","50~100%"]]}],content:"▣ 용적률 = (지상층 연면적 합계 ÷ 대지면적) × 100%\n\n▣ 연면적 산정 제외\n① 지하층 ② 지상주차장(부설) ③ 피난안전구역\n\n▣ 용적률 완화(인센티브)\n• 공개공지: 최대 1.2배\n• 친환경인증: 최대 115%\n• 역세권 도시형생활주택: 최대 1.5배\n\n▣ 실무\n• 용적률 산정용 연면적 ≠ 대장상 연면적\n• 개방형 필로티: 용적률 제외\n• 벽체형 필로티: 포함 (주차장법 부설은 제외 가능)",tags:["용적률","용도지역","연면적","인센티브"]},

{id:3,cat:"계획",sub:"일조",title:"일조권 사선제한 (정북방향)",type:"detail",source:"LAW",code:"",law:"건축법 제61조, 시행령 제86조",url:"https://www.law.go.kr/법령/건축법시행령/(20250227,35148,20250227)/제86조",tables:[{title:"정북방향 이격거리",headers:["건축물 높이","이격거리"],rows:[["9m 이하","대지경계선에서 1.5m 이상"],["9m 초과","대지경계선에서 h/2 이상"]]}],content:"▣ 적용: 전용·일반주거지역 내 건축물\n\n▣ 단면 해설\n\n          ┌──┐\n     h/2  │  │ h>9m\n    ←───→ │  │\n    1.5m  │  │ ≤9m\n   ←───→  │  │\n──────────┴──┴──── 지표면\n   ↑ 대지경계선\n\n▣ 공동주택 동간거리\n• 채광창 벽면 직각방향 = 높이의 1배 이상\n• 최소 8m 이상\n\n▣ TIP\n• '정북방향' = 진북 기준\n• 곡선 경계: 접선 수직방향 측정\n• 각 부분마다 개별 적용",tags:["일조권","사선제한","정북방향","이격거리","동간거리"]},

{id:4,cat:"설계",sub:"주차",title:"부설주차장 설치 기준 (상세)",type:"detail",source:"LAW",code:"",law:"주차장법 시행령 제6조, 별표1",url:"https://www.law.go.kr/법령/주차장법시행령/(20250522,35301,20250222)/제6조",tables:[{title:"시설물별 주차 기준",headers:["시설물","기준","산정"],rows:[["단독주택","50㎡초과 1대","면적"],["다세대(≤85㎡)","세대당 0.7대","세대"],["다세대(>85㎡)","세대당 1대","세대"],["아파트(≤85㎡)","세대당 1대","세대"],["아파트(>85㎡)","세대당 1.2~1.5대","세대"],["제1종근생","134㎡당 1대","면적"],["제2종근생","134㎡당 1대","면적"],["판매시설","134㎡당 1대","면적"],["업무시설","100㎡당 1대","면적"],["종합병원","100㎡당 1대","면적"],["문화·집회","100㎡당 1대","면적"],["공장","300㎡당 1대","면적"]]},{title:"주차장 규격",headers:["구분","너비","길이"],rows:[["일반형","2.5m+","5.0m+"],["확장형","2.6m+","5.2m+"],["장애인","3.3m+","5.0m+"],["경형","2.0m+","3.6m+"]]}],content:"▣ 계산 예시\n┌────────────────────────────┐\n│ 1층 근생 800㎡ + 2~3층 업무 1,200㎡ │\n│ 근생: 800÷134 = 6대              │\n│ 업무: 1,200÷100 = 12대           │\n│ 합계: 18대 (장애인 1대 포함)      │\n└────────────────────────────┘\n\n▣ 차로: 일방 3.0m / 양방 5.5m\n▣ 경사로: 직선 17% / 곡선 14% 이하\n▣ 역세권 300m: 최대 50% 감면 가능",tags:["주차","주차장","주차대수","근생","아파트"]},

{id:8,cat:"구조",sub:"하중",title:"활하중·고정하중 기준",type:"detail",source:"KCSC",code:"KDS 41 10 15",law:"KDS 41 10 05 / KDS 41 10 15",url:"https://www.kcsc.re.kr/Search/ListCodes?query=KDS+41+10",tables:[{title:"용도별 활하중",headers:["용도","kN/㎡"],rows:[["주택·아파트","2.0"],["복도·계단","3.0"],["사무실","2.5"],["상점(1층)","4.0"],["학교교실","3.0"],["서고","7.5"],["극장(고정석)","3.0"],["차고(승용)","2.5"],["차고(트럭)","12.0"],["옥상정원","3.0"],["공장(경)","4.0"],["창고(중)","12.0"]]}],content:"▣ 단위중량: RC 24kN/㎥ / 철골 77kN/㎥ / 목재 5~8kN/㎥\n\n▣ 하중조합 (강도설계)\n① 1.4D\n② 1.2D+1.6L+0.5(Lr/S/R)\n③ 1.2D+1.0E+L\n④ 0.9D+1.0E\n\n▣ 슬래브자중 예: 210mm RC = 5.04kN/㎡",tags:["활하중","고정하중","하중조합","KDS"]},

{id:9,cat:"설비",sub:"소방",title:"스프링클러 설치 기준",type:"detail",source:"LAW",code:"",law:"소방시설법, NFSC 103",url:"https://www.law.go.kr/법령/화재의예방및안전관리에관한법률",tables:[{title:"설치 대상",headers:["대상","기준"],rows:[["수용인원","100명+"],["층수","11층+(아파트제외)"],["지하층","1,000㎡+"],["근생","1,000㎡+"],["판매·복합","5,000㎡+"]]}],content:"▣ 헤드: 1개 방호 21㎡ (내화13㎡)\n▣ 수원: 30개×80L/min×20분 = 48㎥+\n\n▣ 방식비교\n• 습식: 항상 물 충수 → 반응 빠름 (일반)\n• 건식: 압축공기 → 동파방지 (비난방)\n• 준비작동: 감지기→밸브 → 오작동방지 (전산실)\n• 일제살수: 전헤드 동시 → 위험물저장소",tags:["스프링클러","소방","NFSC"]},

{id:10,cat:"설비",sub:"기계",title:"승강기 설치 기준",type:"detail",source:"LAW",code:"",law:"건축법 제64조, 시행령 제89조",url:"https://www.law.go.kr/법령/건축법시행령/(20250227,35148,20250227)/제89조",tables:[{title:"설치 대수",headers:["6층↑ 거실면적","대수"],rows:[["~3,000㎡","1대"],["~5,000㎡","2대"],["~7,000㎡","3대"],["이후 2,000㎡마다","+1대"]]}],content:"▣ 의무: 6층+ 연면적 2,000㎡+\n▣ 비상용: 높이 31m 초과 (비상전원, 소방관전용1대)\n▣ 장애인용: 6층+ 신축 (1.1m×1.35m, 출입문0.8m+)",tags:["승강기","엘리베이터","비상용승강기"]},

{id:11,cat:"시공",sub:"콘크리트",title:"콘크리트 양생·품질 기준",type:"detail",source:"KCSC",code:"KCS 14 20 10",law:"KCS 14 20 10",url:"https://www.kcsc.re.kr/Search/ListCodes?query=KCS+14+20+10",tables:[{title:"습윤양생 기간",headers:["기온","기간"],rows:[["15℃+","5일+"],["10~15℃","7일+"],["5~10℃","9일+"]]},{title:"거푸집 해체 강도",headers:["부재","최소강도"],rows:[["기둥·벽 측면","5MPa+"],["슬래브·보 하부","fck×2/3"],["캔틸레버","fck×100%"]]}],content:"▣ 한중(4℃-): 5℃이상 2일유지, 보온양생\n▣ 서중(25℃+): 타설90분내, 온도35℃이하\n▣ 슬럼프허용: ±25mm\n▣ 압축강도: 3회평균≥fck, 개별≥fck-3.5MPa\n▣ 콜드조인트: 25℃이하 2.5h내 / 25℃+ 2h내",tags:["양생","콘크리트","한중","서중","KCS"]},

{id:12,cat:"해석례",sub:"국토부",title:"필로티 주차장 바닥면적 산정",type:"detail",source:"AURI",code:"",law:"법제처 해석례",url:"https://brb.auri.re.kr/board.es?mid=a10202030000&bid=0010",tables:[],content:"▣ 질의: 필로티 1층 주차장이 바닥면적에 포함되는지?\n\n▣ 해석\n• 기둥만 + 벽없는 개방형 → 면적 제외 ✅\n• 벽체로 둘러싸면 → 면적 포함 ❌\n\n▣ 판단 기준\n┌────────────────────────────┐\n│ 기둥만 + 개방 → 제외 ✅    │\n│ ┌──┐  ┌──┐ ← 벽 없음      │\n│ │기│  │기│                  │\n│ └──┘  └──┘                  │\n├────────────────────────────┤\n│ 벽체 둘러쌈 → 포함 ❌      │\n│ ┌──────────┐ ← 벽 있음     │\n│ │ 주차장   │                │\n│ └──────────┘                │\n└────────────────────────────┘\n\n▣ 용적률에서도 동일 기준 적용",tags:["필로티","바닥면적","용적률","해석례"]},

// ═══ STATE ═══
let state={tab:"search",q:"",cat:"all",typeF:"all",sel:null,favs:JSON.parse(localStorage.getItem("archlaw_favs")||"[]"),msgs:[],ci:"",ld:false};

function setState(updates){Object.assign(state,updates);render();}
function saveFavs(){localStorage.setItem("archlaw_favs",JSON.stringify(state.favs));}
function togFav(id){state.favs=state.favs.includes(id)?state.favs.filter(f=>f!==id):[...state.favs,id];saveFavs();render();}

// ═══ FILTER ═══
function getFiltered(){
  return DB.filter(item=>{
    if(state.typeF==="detail"&&item.type!=="detail")return false;
    if(state.typeF==="link"&&item.type!=="link")return false;
    if(state.cat!=="all"&&item.cat!==state.cat)return false;
    if(!state.q)return true;
    const s=state.q.toLowerCase();
    return item.title.toLowerCase().includes(s)||item.content.toLowerCase().includes(s)||item.tags.some(t=>t.toLowerCase().includes(s))||item.law.toLowerCase().includes(s)||(item.code||"").toLowerCase().includes(s);
  });
}

// ═══ CHAT (스마트 자동응답 — API 불필요, 완전 무료) ═══
function scoreMatch(query, item){
  const q=query.toLowerCase().replace(/[?？\s]+/g," ").trim();
  const words=q.split(" ").filter(w=>w.length>0);
  let score=0;
  const searchFields=(item.title+" "+item.content+" "+item.tags.join(" ")+" "+item.law+" "+(item.code||"")).toLowerCase();
  // exact tag match = high score
  for(const t of item.tags){if(q.includes(t.toLowerCase()))score+=10;}
  // word matches
  for(const w of words){
    if(w.length<2)continue;
    if(item.title.toLowerCase().includes(w))score+=5;
    if(item.tags.some(t=>t.toLowerCase().includes(w)))score+=4;
    if(item.content.toLowerCase().includes(w))score+=2;
    if(item.law.toLowerCase().includes(w))score+=2;
    if((item.code||"").toLowerCase().includes(w))score+=3;
  }
  return score;
}

function buildAnswer(query, matches){
  if(!matches.length)return "죄송합니다. 관련 법규를 찾지 못했습니다.\n\n다른 키워드로 질문하시거나, 검색 탭에서 직접 찾아보세요.\n\n💡 예시: '주차 대수', '건폐율', '방화구획', '내진설계' 등";
  
  let answer="";
  const top=matches.slice(0,3);
  
  if(top.length===1){
    const m=top[0];
    answer+=`📌 ${m.title}\n`;
    answer+=`📜 근거: ${m.law}\n\n`;
    answer+=m.content;
    if(m.tables&&m.tables.length>0){
      for(const t of m.tables){
        answer+=`\n\n📊 ${t.title||"기준표"}\n`;
        answer+=t.headers.join(" | ")+"\n";
        answer+=t.headers.map(()=>"---").join(" | ")+"\n";
        for(const row of t.rows.slice(0,8)){answer+=row.join(" | ")+"\n";}
        if(t.rows.length>8)answer+=`... 외 ${t.rows.length-8}개 항목\n`;
      }
    }
    if(m.url)answer+=`\n\n🔗 원문 확인: ${m.url}`;
  }else{
    answer+=`📋 관련 법규 ${top.length}건을 찾았습니다.\n\n`;
    for(let i=0;i<top.length;i++){
      const m=top[i];
      answer+=`━━━ ${i+1}. ${m.title} ━━━\n`;
      answer+=`📜 ${m.law}\n\n`;
      // show first meaningful part of content
      const lines=m.content.split("\n").filter(l=>l.trim());
      answer+=lines.slice(0,6).join("\n");
      if(lines.length>6)answer+="\n...";
      if(m.tables&&m.tables[0]){
        const t=m.tables[0];
        answer+=`\n\n📊 ${t.title||""}\n`;
        answer+=t.headers.join(" | ")+"\n";
        for(const row of t.rows.slice(0,4)){answer+=row.join(" | ")+"\n";}
        if(t.rows.length>4)answer+=`... 외 ${t.rows.length-4}개\n`;
      }
      if(m.url)answer+=`\n🔗 ${m.url}`;
      answer+="\n\n";
    }
  }
  answer+="\n\n※ 실무 적용 시 원문 확인 필수 (law.go.kr / kcsc.re.kr / brb.auri.re.kr)";
  return answer;
}

async function sendChat(){
  if(!state.ci.trim()||state.ld)return;
  const u=state.ci.trim();
  state.msgs.push({role:"user",text:u});
  setState({ci:"",ld:true});
  
  // simulate brief thinking delay
  await new Promise(r=>setTimeout(r,400+Math.random()*600));
  
  // score all detail items
  const scored=DB.filter(x=>x.type==="detail").map(item=>({...item,score:scoreMatch(u,item)})).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
  
  const answer=buildAnswer(u,scored);
  state.msgs.push({role:"assistant",text:answer});
  setState({ld:false});
  setTimeout(()=>{const el=document.getElementById("chatEnd");el&&el.scrollIntoView({behavior:"smooth"});},100);
}

// ═══ RENDER TABLE ═══
function renderTable(t){
  return `<div class="data-table">${t.title?`<div class="table-title">${t.title}</div>`:""}<div class="table-wrap"><table><thead><tr>${t.headers.map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${t.rows.map((r,i)=>`<tr>${r.map((c,j)=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table></div></div>`;
}
